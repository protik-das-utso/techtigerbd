<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ticket Status — StreamyBD</title>
    <meta name="robots" content="noindex,follow" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16.png?v=1" />
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=1" />
    <style>
        :root {
            --bg: #f6f8fb;
            --card: #ffffff;
            --border: #e6eaf3;
            --text: #0f172a;
            --muted: #64748b;
            --shadow: 0 14px 30px rgba(2, 6, 23, .07);
            --radius: 18px;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 15px/1.55 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial
        }

        .wrap {
            max-width: 860px;
            margin: 22px auto;
            padding: 18px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap
        }

        .box {
            flex: 1 1 260px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            background: #fafbff
        }

        .k {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px
        }

        .v {
            font-weight: 800;
            white-space: pre-wrap;
            word-break: break-word
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #eef2ff;
            font-weight: 800
        }

        .pill.green {
            border-color: #16a34a;
            /* green-600 */
            background: #ecfdf5;
            /* green-50 */
            color: #065f46;
            /* green-800 */
        }

        .pill.red {
            border-color: #dc2626;
            /* red-600 */
            background: #fef2f2;
            /* red-50 */
            color: #7f1d1d;
            /* red-800 */
        }

        .muted {
            color: var(--muted)
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border)
        }

        button {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #111827;
            color: #fff;
            font-weight: 800;
            cursor: pointer
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed
        }
    </style>
</head>

<body>
    <main class="wrap">
        <div class="card">
            <h2 style="margin:0 0 6px 0">StreamyBD Ticket Status</h2>
            <div class="muted">Enter your Ticket No to see current status.</div>

            <div class="row" style="margin-top:12px;align-items:end">
                <div style="flex:1 1 260px">
                    <div class="k">Ticket No</div>
                    <input id="ticketno" placeholder="e.g. 231242" />
                </div>
                <div>
                    <button id="btn" onclick="loadTicket()">Check</button>
                </div>
                <div id="msg" class="muted" style="padding:10px 0"></div>
            </div>

            <div id="result" style="display:none;margin-top:14px">
                <div class="row">
                    <div class="box">
                        <div class="k">Ticket No</div>
                        <div class="v" id="r_ticket"></div>
                    </div>
                    <div class="box">
                        <div class="k">Status</div>
                        <div class="v"><span class="pill" id="r_status"></span></div>
                    </div>
                </div>

                <div class="row" style="margin-top:12px">
                    <div class="box">
                        <div class="k">Category</div>
                        <div class="v" id="r_category"></div>
                    </div>
                    <div class="box">
                        <div class="k">Account</div>
                        <div class="v" id="r_account"></div>
                    </div>
                </div>

                <div class="row" style="margin-top:12px">
                    <div class="box" style="flex:1 1 100%">
                        <div class="k">Problem</div>
                        <div class="v" id="r_problem"></div>
                    </div>
                </div>

                <div class="row" style="margin-top:12px">
                    <div class="box" style="flex:1 1 100%">
                        <div class="k">Note</div>
                        <div class="v" id="r_note"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyLjru6Gqm9qlXUWgDYPCMaGGeEIam0OrWRguPVTGYj73eI6zyt745aZaWRLreVJmGt/exec";

        const $ = (id) => document.getElementById(id);

        function setMsg(t, isErr = false) {
            $("msg").textContent = t || "";
            $("msg").style.color = isErr ? "#b91c1c" : "";
        }

        function fill(t) {
            $("result").style.display = "block";
            $("r_ticket").textContent = t.ticketNo || "";
            const statusEl = $("r_status");
            const status = (t.status || "Pending").toString().toUpperCase();

            statusEl.textContent = status;
            statusEl.classList.remove("green", "red");

            if (status === "SOLVED") {
                statusEl.classList.add("green");
            } else {
                statusEl.classList.add("red");
            }

            $("r_category").textContent = t.category || "";
            $("r_problem").textContent = t.problem || "";
            $("r_account").textContent = t.account || "";
            $("r_note").textContent = t.note || "";

            // Make link shareable: /ticket.html?ticketno=xxxx
            const newUrl = `${location.pathname}?ticketno=${encodeURIComponent(t.ticketNo || "")}`;
            history.replaceState({}, "", newUrl);
        }

        async function loadTicket() {
            const ticketno = $("ticketno").value.trim();
            if (!ticketno) { setMsg("Enter a ticket number.", true); return; }

            $("btn").disabled = true;
            $("result").style.display = "none";
            setMsg("Loading...");

            try {
                const url = `${GAS_URL}?action=ticket_get&ticketno=${encodeURIComponent(ticketno)}&t=${Date.now()}`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.ok) {
                    setMsg(data.error || "Ticket not found", true);
                    return;
                }
                setMsg("Updated.");
                fill(data.ticket);
            } catch (e) {
                setMsg("Failed to load. Try again.", true);
            } finally {
                $("btn").disabled = false;
            }
        }

        // Auto-load if opened with ?ticketno=
        (function init() {
            const qs = new URLSearchParams(location.search);
            const t = (qs.get("ticketno") || "").trim();
            if (t) {
                $("ticketno").value = t;
                loadTicket();
            }
        })();
    </script>
    <script defer src="/assets/livechat.js?v=lc7"></script>
</body>

</html>
